<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula3</title>
</head>
<body>
    
<!--colocando o titulo principal-->
<h1>Exemplo da aula sobre tag's e semanticas</h1>

<!--div para criar uma caixa com quais são as tags
Criando um bloco*-->
<div class="box">
    <!--subtitulo-->
    <h2> Tag semanticas</h2>

    <!--Este é o meu header-->
    <header>Este é meu header </header>

    <!--tag onde posso navegar pelo meu menu
    posso usar como indice para ir para subtitlos dentro
    da página-->
    <nav>Meu nav </nav>

    <!-- dentro do main, posso colocar
    seção e o artigo-->
    <main>Conteúdo principal</main>


    <!--uma seção-->
    <section>Uma seção</section>

    <article>Um artigo</article>

    <!--tag pra criar o rodapé da minha página-->
    <footer>Rodapé da página</footer>
</div>

<!--criando outro bloco-->
<div>

    <!--Titulo do bloco-->
    <h2>Tags blocks e Inline</h2>

    <!--Conteúdo do bloco-->
    <p>Paragráfo é block-level</p>

    <!--Link-->
    <a href="#">Link é inline</a>
</div>

<!--criando outro bloco-->
<div class="box">
    <!--titulo do bloco-->
    <h2>Seltores CSS</h2>

    <!--classe para destacar as coisas
    criando um fundo amarelo-->
    <p class="destaques">Classe: fundo amarelo</p>

    <!--criei o pid e vou chama-lo futuramente
    no CSS-->
    <p id="especial">"pID"_ID: Texto azul"</p>
</div>

</body>
</html>
