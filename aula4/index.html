<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 4 - Css</title>
</head>

<style>

    body{

        background-color: aquamarine;
    }

    .box{

        text-align: center;

        border: 1px, solid, black;

        padding: 10px;

        margin-bottom: 20%;

        background-color: rgb(46, 255, 185);

        color: rgb(40, 115, 255);
    }


    .box2{

        /*alinhamento do texto */
        text-align: left;


        /*uso pra criar as bordas */
        border: 1px, solid, black;

        /*tamanho da caixa */
        padding: 0%;

    

        /*distancia da esquerda */
        margin-left: 0%;

        /*cor de fundo */
        background-color: rgb(46, 255, 185);

        /*cor da fonte*/
        color: rgb(0, 0, 0);
    }


</style>

<body>
    <main>

        <div class = "box">
            <h1>Bem vindo ao nosso site!</h1>

            <p><em>Vamos conhecer as <strong>tag's de linha!</strong></em></p>

        </div>

        <div class="box2">

            <p>Tags de linha: <br><em>em:</em> ao colocar um texto entre essa tag,
                 o texto ficará em itálico</p>

        </div>
    </main>
</body>
</html>
