<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 4 - Css</title>
</head>

<style>

    body{

        background-color: #79bafc;
    }

    .box{

        text-align: center;

        border: 1px, solid, black;

        padding: 10px;

        margin-bottom: 20px;

        background-color: #f2e8fb;

        color: rgb(13, 13, 14);
    }

    
    .box2{

        /*alinhamento do texto */
        text-align: left;

        /*limitando a largura da caixa */
        width: 35%;

        /*uso pra criar as bordas */
        border: 1px, solid, black;

        /*tamanho da caixa */
        padding: 10px;

        /*distancia da esquerda */
        margin-bottom: 20px;

        /*cor de fundo */
        background-color: #d0c9f9;

        /*cor da fonte*/
        color: rgb(0, 0, 0);
    }


</style>

<body>
    <main>

        <div class = "box">
            <h1>Bem vindo ao nosso site!</h1>

            <p><em>Vamos conhecer as <strong>tag's de linha!</strong></em></p>

        </div>

        <div class="box2">

            <p>Tags de linha: <br><em>em:</em> ao colocar um texto entre essa tag,
                 o texto ficará em itálico.</p>

        </div>
    </main>
</body>
</html>
